    <!--
      Social preview cards (Open Graph / Twitter). Social scrapers don't run
      JavaScript, so these need static absolute URLs — replace the placeholder
      domain below (and in public/robots.txt + public/sitemap.xml) with the
      real production domain. Search-facing tags (title, description,
      canonical, robots, og:url) are kept accurate per page at runtime by
      src/constants/seo.js, which uses the live origin.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Passerelle TCF Canada" />
    <meta property="og:locale" content="fr_CA" />
    <meta property="og:title" content="Passerelle · Préparation au TCF Canada" />
    <meta
      property="og:description"
      content="Préparez le TCF Canada en ligne : quiz au format officiel des quatre épreuves, TCF blancs chronométrés, analyse IA de l'écrit et de l'oral et suivi de votre niveau CECR."
    />
    <meta property="og:url" content="https://passerelle-tcf.vercel.app/" />
    <meta property="og:image" content="https://passerelle-tcf.vercel.app/logo-full.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Passerelle · Préparation au TCF Canada" />
    <meta
      name="twitter:description"
      content="Préparez le TCF Canada en ligne : quiz au format officiel des quatre épreuves, TCF blancs chronométrés et suivi de votre niveau CECR."
    />
    <meta name="twitter:image" content="https://passerelle-tcf.vercel.app/logo-full.png" />

    <noscript>
      <div style="font-family: system-ui, sans-serif; max-width: 40rem; margin: 4rem auto; padding: 0 1rem">
        <h1>Passerelle · Préparation au TCF Canada</h1>
        <p>
          Passerelle est une plateforme de préparation au TCF Canada : quiz au format officiel des quatre épreuves
          (compréhension orale et écrite, expression orale et écrite), TCF blancs chronométrés, calculateur de scores
          NCLC et suivi de progression. Activez JavaScript pour utiliser l'application.
        </p>
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
